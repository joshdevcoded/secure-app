name: DevSecOps Pipeline

on:
  push:
    branches: [ "main" ]

jobs:

  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Run Semgrep (SAST)
        uses: returntocorp/semgrep-action@v1

      - name: Dependency Scan
        run: |
          pip install safety
          safety check -r requirements.txt || true

      - name: Secret Scan
        run: |
          pip install detect-secrets
          detect-secrets scan > secrets-report.json

      - name: Upload scan artifacts
        uses: actions/upload-artifact@v3
        with:
          name: scan-results
          path: |
            secrets-report.json

  build:
    needs: scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image
        run: |
          docker build -t secure-app:${{ github.sha }} .

      - name: Generate SBOM
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh
          ./syft packages docker:secure-app:${{ github.sha }} -o cyclonedx-json > sbom.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v3
        with:
          name: sbom
          path: sbom.json

      - name: Mark as trusted build
        run: echo "Trusted build for commit ${{ github.sha }}"
